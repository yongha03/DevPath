server:
  # 서버 포트 (기본 8082, SERVER_PORT로 덮어씀)
  port: ${SERVER_PORT:8082}
  # 프록시 헤더 사용
  forward-headers-strategy: framework

spring:
  application:
    name: devpath

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  security:
    oauth2:
      client:
        registration:
          github:
            # GitHub OAuth 키
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email
          google:
            # Google OAuth 키
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile

  config:
    # .env 로드
    import: optional:file:.env[.properties]

  sql:
    init:
      # 기본값은 안전하게 자동 SQL 실행을 막는다. 필요한 경우 local profile에서 명시적으로 켠다.
      mode: ${SPRING_SQL_INIT_MODE:never}
      encoding: UTF-8

  jpa:
    hibernate:
      # 운영/공유 DB 보호를 위해 기본값은 검증만 수행한다.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 1000

  data:
    redis:
      # Redis 연결
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

logging:
  level:
    org.hibernate.SQL: info

springdoc:
  swagger-ui:
    disable-swagger-default-url: true
    urls-primary-name: 학습자

app:
  oauth2:
    # 로그인 후 리다이렉트 URL
    redirect-url: ${DEVPATH_OAUTH2_REDIRECT_URL:${OAUTH2_REDIRECT_URL:http://localhost:8084/oauth2/redirect}}
    # OAuth2 허용 Origin
    allowed-origins: ${DEVPATH_OAUTH2_ALLOWED_ORIGINS:${OAUTH2_ALLOWED_ORIGINS:http://localhost:8084}}
  security:
    # HTTPS 강제 여부
    require-https: ${DEVPATH_REQUIRE_HTTPS:${REQUIRE_HTTPS:true}}
  cors:
    # CORS 허용 Origin
    allowed-origins: ${DEVPATH_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:8084}}

jwt:
  # Base64 HMAC 키. 운영/공유 환경에서는 반드시 환경변수로 주입한다.
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000 # 3600000ms = 1시간
  refresh-token-expiration: 1209600000 # 1209600000ms = 14일

ocr:
  server:
    # 외부 OCR 서버 주소
    url: ${OCR_SERVER_URL:http://localhost:5000}
  # sourceTextHint를 로컬/테스트 fallback으로 허용할지 여부
  allow-source-text-fallback: ${OCR_ALLOW_SOURCE_TEXT_FALLBACK:false}

gemini:
  api:
    key: ${GEMINI_API_KEY}
anthropic:
  # Claude Vision OCR 사용 시 필요 (없으면 Python OCR 서버 → Tesseract.js 폴백)
  api-key: ${ANTHROPIC_API_KEY:}

blog:
  publish:
    # 로컬/테스트에서만 MOCK provider를 명시적으로 허용
    allow-mock-provider: ${BLOG_PUBLISH_ALLOW_MOCK_PROVIDER:false}
    providers:
      devto:
        # DEV.to article create API
        api-url: ${DEVTO_API_URL:https://dev.to/api/articles}
        api-key: ${DEVTO_API_KEY:}
