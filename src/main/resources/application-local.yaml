spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:devpath_db}?sslmode=${DB_SSLMODE:disable}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
      encoding: UTF-8
      schema-locations: optional:classpath:db/local/project-schema-prep.sql
      separator: "^^^ END OF SCRIPT ^^^"

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    defer-datasource-initialization: false

app:
  oauth2:
    redirect-url: ${DEVPATH_OAUTH2_REDIRECT_URL:${OAUTH2_REDIRECT_URL:http://localhost:8084/oauth2/redirect}}
    allowed-origins: ${DEVPATH_OAUTH2_ALLOWED_ORIGINS:${OAUTH2_ALLOWED_ORIGINS:http://localhost:8084}}
  security:
    require-https: ${DEVPATH_REQUIRE_HTTPS:${REQUIRE_HTTPS:false}}
  cors:
    allowed-origins: ${DEVPATH_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:8084}}

jwt:
  secret: ${JWT_SECRET:c3ByaW5nLWJvb3QtZGV2cGF0aC1zZWNyZXQta2V5LXRlc3QtZ2VuZXJhdGUtMjAyNjAyMjQ=}

ocr:
  allow-source-text-fallback: ${OCR_ALLOW_SOURCE_TEXT_FALLBACK:true}

blog:
  publish:
    allow-mock-provider: ${BLOG_PUBLISH_ALLOW_MOCK_PROVIDER:true}
