name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - master  # master 브랜치에 코드가 push되면 자동으로 배포가 시작됩니다.

jobs:
  # ─────────────────────────────────────────────
  # Job 1. 백엔드 빌드 → JAR을 오라클 서버로 전송 후 재시작
  # ─────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v3

      # 2. Java 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 캐시 (빌드 속도 향상)
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # 4. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Spotless 포맷 자동 교정 (커밋 없이 워크스페이스에서만 수정)
      - name: Auto-fix code formatting
        run: ./gradlew spotlessApply

      # 6. Gradle 빌드 (테스트 스킵)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 7. 빌드된 JAR을 오라클 서버로 전송 (SCP)
      - name: Upload JAR to Oracle Cloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          source: "build/libs/DevPath-0.0.1-SNAPSHOT.jar"
          target: ${{ secrets.PROJECT_PATH }}
          strip_components: 2   # build/libs/ 경로 제거 → JAR만 전송

      # 8. 기존 프로세스 종료 후 새 JAR로 재시작
      - name: Restart backend process
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            # 기존 java 프로세스 종료 (없어도 오류 무시)
            pkill -f "DevPath-0.0.1-SNAPSHOT.jar" || true
            sleep 3

            # 새 JAR로 백그라운드 실행 (로그는 app.log에 저장)
            cd ${{ secrets.PROJECT_PATH }}
            nohup java -jar DevPath-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            echo "Backend restarted successfully"

  # ─────────────────────────────────────────────
  # Job 2. 프론트엔드 Docker 재빌드 (백엔드 완료 후 실행)
  # ─────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend  # 백엔드 배포가 끝난 후에 실행 (서버 자원 과부하 방지)

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v3

      # 2. 오라클 서버에서 최신 코드 pull 후 프론트 재빌드
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.PROJECT_PATH }}

            # 최신 코드 pull
            git pull origin master

            # 프론트엔드 컨테이너 재빌드
            docker compose --profile frontend-static up -d --build frontend

            # 빌드 후 쓸모없는 이미지 정리
            docker image prune -f

            echo "Frontend restarted successfully"
