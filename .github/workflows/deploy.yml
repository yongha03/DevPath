name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - master  # master 브랜치에 코드가 push되면 자동으로 배포가 시작됩니다.

jobs:
  # ─────────────────────────────────────────────
  # Job 1. 오라클 서버에서 직접 pull·빌드 후 재시작
  #   (러너→서버 SCP push 경로가 ~15KB/s로 무너져, 서버가 GitHub에서 직접 pull·빌드하는 방식으로 전환)
  # ─────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      # 서버 접속 → 최신 master pull → 빌드 → systemd 실행 경로로 복사 → 재시작
      - name: Build & restart backend on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          command_timeout: 20m   # 빌드 + 기동 시간 여유
          script: |
            set -e
            cd ${{ secrets.PROJECT_PATH }}

            # 1) 최신 master 동기화 (작은 git delta만 전송 → 서버→GitHub은 빠름)
            git fetch origin master
            git reset --hard origin/master

            # 2) 빌드 (테스트/스팟리스 제외, gradle 데몬 미상주).
            #    stop 이전에 빌드 → 실패 시 기존 인스턴스가 계속 서비스(fail-safe).
            chmod +x gradlew
            ./gradlew clean build -x test -x spotlessCheck --no-daemon

            # 3) 빌드 산출물을 systemd ExecStart 경로(루트 JAR)로 복사
            cp build/libs/DevPath-0.0.1-SNAPSHOT.jar ./DevPath-0.0.1-SNAPSHOT.jar

            # 4) systemd 서비스 정지
            sudo systemctl stop devpath || true

            # 5) systemd 외부 좀비(다른 경로 JAR 포함)를 JAR 이름으로 찾되 'java 프로세스만' 종료.
            #    pkill -f 'DevPath-...jar' 는 배포 셸 자신까지 매칭해 자살하므로 comm=java 필터 사용.
            for pid in $(pgrep -f 'DevPath-0.0.1-SNAPSHOT' 2>/dev/null || true); do
              if [ "$(ps -p "$pid" -o comm= 2>/dev/null)" = "java" ]; then
                sudo kill "$pid" 2>/dev/null || true
              fi
            done

            # 6) 8083을 쥔 잔존 프로세스가 있으면 포트 기준으로 마저 정리
            sudo fuser -k 8083/tcp 2>/dev/null || true
            sleep 3

            # 7) systemd로 단독 기동 (ExecStart = 방금 복사된 루트 JAR)
            sudo systemctl start devpath

            # 8) 헬스체크: 8083이 응답하는지 최대 120초 폴링. (인증 유무와 무관하게 HTTP 코드가
            #    잡히면 새 프로세스가 포트를 잡은 것으로 본다. 000=무응답 → 실패 처리)
            for i in $(seq 1 24); do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8083/actuator/health || echo 000)
              if [ "$code" != "000" ]; then
                echo "Backend up on 8083 (HTTP $code, attempt $i)"
                exit 0
              fi
              sleep 5
            done
            echo "Backend health check FAILED (no response on 8083)"
            sudo systemctl status devpath --no-pager -l | tail -30 || true
            exit 1

  # ─────────────────────────────────────────────
  # Job 2. 프론트엔드 Docker 재빌드 (백엔드 완료 후 실행)
  # ─────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend  # 백엔드 배포가 끝난 후에 실행 (서버 자원 과부하 방지)

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 오라클 서버에서 최신 코드 pull 후 프론트 재빌드
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.PROJECT_PATH }}

            # 서버 로컬 변경사항 무시하고 remote master 기준으로 강제 동기화
            git fetch origin master
            git reset --hard origin/master

            # 프론트엔드 컨테이너 재빌드
            docker compose --profile frontend-static up -d --build frontend

            # 빌드 후 쓸모없는 이미지 정리
            docker image prune -f

            echo "Frontend restarted successfully"
