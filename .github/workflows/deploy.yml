name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - master  # master 브랜치에 코드가 push되면 자동으로 배포가 시작됩니다.

jobs:
  # ─────────────────────────────────────────────
  # Job 1. 백엔드 빌드 → JAR을 오라클 서버로 전송 후 재시작
  # ─────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. Java 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle 캐시 (빌드 속도 향상)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # 4. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Spotless 포맷 자동 교정 (커밋 없이 워크스페이스에서만 수정)
      - name: Auto-fix code formatting
        run: ./gradlew spotlessApply

      # 6. Gradle 빌드 (테스트 스킵)
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 7. 빌드된 JAR을 오라클 서버로 전송 (SCP)
      - name: Upload JAR to Oracle Cloud
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          source: "build/libs/DevPath-0.0.1-SNAPSHOT.jar"
          target: ${{ secrets.PROJECT_PATH }}
          strip_components: 2   # build/libs/ 경로 제거 → JAR만 전송

      # 8. systemd로 백엔드 서비스 재시작
      - name: Restart backend process
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            set -e

            # 1) systemd 서비스 정지
            sudo systemctl stop devpath || true

            # 2) 포트가 아니라 JAR 이름 기준으로 모든 백엔드 프로세스를 정리한다.
            #    systemd 외부에서 수동(nohup 등)으로 띄워진 좀비나, build/libs 등 다른
            #    경로의 옛 JAR 프로세스까지 모두 종료해야 옛 코드가 8083을 다시 점유하는 것을 막는다.
            #    (기존 fuser -k 8083 은 "그 순간 포트를 쥔 프로세스 하나"만 죽여 좀비를 놓쳤다.)
            sudo pkill -f 'DevPath-0.0.1-SNAPSHOT.jar' 2>/dev/null || true

            # 3) 그래도 8083을 쥔 잔존 프로세스가 있으면 포트 기준으로 마저 정리
            sudo fuser -k 8083/tcp 2>/dev/null || true
            sleep 3

            # 4) systemd로 단독 기동 (ExecStart = 방금 SCP된 루트 JAR)
            sudo systemctl start devpath

            # 5) 헬스체크: 새 버전이 실제 8083에 떠서 응답하는지 최대 90초 폴링.
            #    실패 시 배포를 실패 처리하여 "옛 코드가 계속 서비스되는데 배포는 성공" 상황을 방지한다.
            for i in $(seq 1 18); do
              if curl -sf http://localhost:8083/actuator/health >/dev/null 2>&1; then
                echo "Backend healthy (attempt $i)"
                exit 0
              fi
              sleep 5
            done
            echo "Backend health check FAILED"
            sudo systemctl status devpath --no-pager -l | tail -30 || true
            exit 1

  # ─────────────────────────────────────────────
  # Job 2. 프론트엔드 Docker 재빌드 (백엔드 완료 후 실행)
  # ─────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend  # 백엔드 배포가 끝난 후에 실행 (서버 자원 과부하 방지)

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 오라클 서버에서 최신 코드 pull 후 프론트 재빌드
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.PROJECT_PATH }}

            # 서버 로컬 변경사항 무시하고 remote master 기준으로 강제 동기화
            git fetch origin master
            git reset --hard origin/master

            # 프론트엔드 컨테이너 재빌드
            docker compose --profile frontend-static up -d --build frontend

            # 빌드 후 쓸모없는 이미지 정리
            docker image prune -f

            echo "Frontend restarted successfully"
