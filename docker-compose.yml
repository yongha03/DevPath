services:
  frontend:
    build:
      context: ./frontend
    container_name: devpath-frontend
    profiles:
      - frontend-static
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore:
            - node_modules/
            - dist/
    ports:
      - "8084:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend-dev:
    image: node:20-bookworm-slim
    container_name: devpath-frontend-dev
    working_dir: /app
    command: sh /app/scripts/frontend-dev.sh
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_BACKEND_TARGET: "http://host.docker.internal:8082"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "8084:8084"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: devpath-postgres
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: devpath-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: always

  ocr-server:
    build:
      context: ./ocr-server
    container_name: devpath-ocr-server
    ports:
      - "5000:5000"         # Spring Boot → localhost:5000/ocr 로 직접 접근
    volumes:
      - ocr_model_cache:/app/.EasyOCR   # 모델 파일 캐싱 (재시작 시 재다운로드 방지)
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
  ocr_model_cache:
